<div class="affaires-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-left">
      <h2 class="page-title">Gestion des Affaires</h2>
    </div>
    <button class="btn-new" (click)="openNewForm()">
      <span class="material-symbols-outlined">add</span>
      Nouvelle Affaire
    </button>
  </div>

  <!-- KPI Grid -->
  <div class="kpi-grid">
    <app-affaire-kpi-card
      label="Affaires en cours"
      icon="work"
      [value]="statsActives()"
      trend="+12%"
      variant="green" />

    <app-affaire-kpi-card
      label="RAF Total"
      icon="account_balance_wallet"
      [value]="formatAmount(statsRafTotal())"
      unit="TND"
      variant="blue" />

    <app-affaire-kpi-card
      label="Budget Total"
      icon="payments"
      [value]="formatAmount(statsBudgetTotal())"
      unit="TND"
      variant="amber" />

    <app-affaire-kpi-card
      label="Projets en attente"
      icon="pause_circle"
      [value]="statsSuspendu()"
      unit="Unités"
      variant="red" />
  </div>

  <!-- Table -->
  <app-affaire-table
    [affaires]="affaires()"
    [loading]="loading()"
    [error]="error()"
    [deletingId]="deletingId()"
    [totalElements]="totalElements()"
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    [(searchText)]="searchText"
    [(filterStatut)]="filterStatut"
    [(filterType)]="filterType"
    (rowClick)="navigateToDetail($event)"
    (pageChange)="goToPage($event)"
    (searchGo)="onSearch()"
    (filterGo)="onFilterChange()" />

</div>
