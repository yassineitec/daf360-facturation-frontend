<div class="flex flex-col gap-5">

  <!-- KPI cards -->
  <div class="grid grid-cols-3 gap-4">
    <daf-metric-card
      label="En attente"
      [value]="pendingCount()"
      [options]="{ icon: 'pending_actions', iconBg: 'bg-warning/10', iconColor: 'text-warning' }" />

    <daf-metric-card
      label="Urgents (L3–L4)"
      [value]="urgentCount()"
      [options]="{ icon: 'priority_high', iconBg: 'bg-danger/10', iconColor: 'text-danger', valueColor: 'text-danger' }" />

    <daf-metric-card
      label="Traités aujourd'hui"
      value="—"
      [options]="{ icon: 'verified', iconBg: 'bg-success/10', iconColor: 'text-success' }" />
  </div>

  <!-- Toolbar: search + refresh -->
  <daf-toolbar
    [searchValue]="searchQuery()"
    searchPlaceholder="Libellé, ID, montant…"
    [actions]="toolbarActions"
    (searchChange)="searchQuery.set($event)"
    (actionClick)="onToolbarAction($event)" />

  <!-- Error banner -->
  @if (serverError()) {
    <div class="px-4 py-2.5 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">
      {{ serverError() }}
    </div>
  }

  <!-- Data table -->
  <daf-card [options]="{ padding: 'none', variant: 'default', radius: 'xl' }">
    <daf-data-table
      [columns]="tableColumns"
      [rows]="tableRows()"
      [config]="tableConfig()">

      <ng-template dafCell="label" let-row>
        <div class="flex items-center gap-2">
          <div>
            <p class="font-semibold text-on-surface text-sm truncate max-w-56">
              {{ row['label'] ?? '—' }}
            </p>
            @if (row['_isUrgent']) {
              <span class="text-xs font-bold text-white bg-danger px-1.5 py-px rounded-full">URGENT</span>
            }
          </div>
        </div>
      </ng-template>

      <ng-template dafCell="amount" let-row>
        <div class="text-right">
          <p class="font-bold text-on-surface">{{ row['amount'] }}</p>
          @if (row['amountEur']) {
            <p class="text-xs text-outline">{{ row['amountEur'] }}</p>
          }
        </div>
      </ng-template>

      <ng-template dafCell="status" let-row>
        <daf-badge
          [label]="statusLabel(row['status'])"
          [options]="statusBadgeOptions(row['status'])" />
      </ng-template>

      <ng-template dafCell="level" let-row>
        @if (row['level']) {
          <daf-badge
            [label]="row['level']"
            [options]="approvalBadgeOptions(row['level'])" />
        } @else {
          <span class="text-outline">—</span>
        }
      </ng-template>

      <ng-template dafCell="_actions" let-row>
        <div class="flex justify-end gap-1" (click)="$event.stopPropagation()">
          <button class="action-icon-btn action-icon-btn--green" title="Approuver"
            (click)="openModal(row['_raw'], 'approve')">
            <span class="material-symbols-outlined">check_circle</span>
          </button>
          <button class="action-icon-btn action-icon-btn--amber" title="Retourner"
            (click)="openModal(row['_raw'], 'return')">
            <span class="material-symbols-outlined">undo</span>
          </button>
          <button class="action-icon-btn action-icon-btn--danger" title="Rejeter"
            (click)="openModal(row['_raw'], 'reject')">
            <span class="material-symbols-outlined">cancel</span>
          </button>
        </div>
      </ng-template>

    </daf-data-table>
  </daf-card>

</div>

<!-- Approve modal (self-contained, handles API calls) -->
@if (modalLine()) {
  <app-approve-modal
    [costLine]="modalLine()!"
    [action]="modalAction()"
    [level]="modalLevel()"
    (closed)="closeModal()"
    (resolved)="onResolved()" />
}
